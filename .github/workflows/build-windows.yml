name: "Build Windows"

on:
  workflow_dispatch:
    inputs:
      version:    { type: string,  default: '' }
      prerelease: { type: boolean, default: false }
  workflow_run:
    workflows: ["Version Bump"]
    types: [completed]

permissions:
  contents: write
  actions:  write

jobs:
  build-windows:
    name: "Build Windows x64"
    runs-on: windows-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter deps
        run: flutter pub get

      - name: Resolve version
        shell: pwsh
        run: |
          $override = "${{ inputs.version }}"
          if ($override -ne "") {
            $ver = $override
          } else {
            $m = Select-String -Path pubspec.yaml -Pattern '^version:\s*(\S+)' | Select-Object -First 1
            if (-not $m) { Write-Error "version not found"; exit 1 }
            $ver = $m.Matches[0].Groups[1].Value.Split('+')[0]
          }
          "VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Building: v$ver"

      # ── Test: verify CMakeLists has MSVC silence flag ──────────
      - name: Verify Windows MSVC compatibility flag
        shell: pwsh
        run: |
          $content = Get-Content windows/CMakeLists.txt -Raw
          if ($content -match '_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS') {
            Write-Host "✅ MSVC compatibility flag present"
          } else {
            Write-Error "❌ Missing _SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS in CMakeLists.txt"
            exit 1
          }

      - name: Build Windows release
        run: flutter build windows --release --build-number ${{ github.run_number }}

      # ── Test: verify release directory has expected files ──────
      - name: Verify Windows build output
        shell: pwsh
        run: |
          $dir = "build/windows/x64/runner/Release"
          if (-not (Test-Path $dir)) { Write-Error "Release dir missing"; exit 1 }
          $exe = Get-ChildItem $dir -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "No .exe found in release dir"; exit 1 }
          Write-Host "✅ Executable: $($exe.Name) ($([math]::Round($exe.Length/1MB,2)) MB)"

      - name: Zip Windows build
        shell: pwsh
        run: |
          $zip = "Nasbeat-v$env:VERSION-Windows-x64.zip"
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath $zip
          $size = [math]::Round((Get-Item $zip).Length / 1MB, 2)
          Write-Host "✅ Created $zip ($size MB)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nasbeat-v${{ env.VERSION }}-Windows-x64
          retention-days: 7
          path: Nasbeat-v${{ env.VERSION }}-Windows-x64.zip

      - name: Attach ZIP to release
        uses: ncipollo/release-action@v1
        with:
          artifacts:    Nasbeat-v${{ env.VERSION }}-Windows-x64.zip
          tag:          v${{ env.VERSION }}
          name:         "Nasbeat v${{ env.VERSION }}"
          token:        ${{ secrets.GITHUB_TOKEN }}
          prerelease:   ${{ inputs.prerelease }}
          allowUpdates: true
          omitBodyDuringUpdate: true
