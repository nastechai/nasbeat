name: "Code Quality"

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Version Bump"]
    types: [completed]
  push:
    branches: [main]
    paths: ['lib/**', 'test/**', 'pubspec.yaml']
  pull_request:
    branches: [main]

permissions:
  contents:      read
  actions:       write
  pull-requests: write

jobs:
  quality:
    name: "Analyze, Format & Test"
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install deps
        run: flutter pub get

      # ── Test 1: Dart formatter ──────────────────────────────────
      - name: Check dart formatting
        id: format
        continue-on-error: true
        run: |
          set +e
          dart format --output=none --set-exit-if-changed lib/ test/ 2>&1 | tee /tmp/format.txt
          FMT_EXIT=${PIPESTATUS[0]}
          set -e
          # Count changed files (no grep -c to avoid multiline variable bugs)
          CHANGED=$(grep -E "^Changed" /tmp/format.txt 2>/dev/null | wc -l | xargs)
          echo "FORMAT_FAIL=$([ $FMT_EXIT -ne 0 ] && echo true || echo false)" >> "$GITHUB_ENV"
          echo "FORMAT_CHANGED=${CHANGED}" >> "$GITHUB_ENV"
          if [ $FMT_EXIT -ne 0 ]; then
            echo "❌ $CHANGED file(s) need formatting:"
            cat /tmp/format.txt
          else
            echo "✅ All files formatted correctly"
          fi

      # ── Test 2: Static analysis ─────────────────────────────────
      - name: Flutter analyze
        id: analyze
        continue-on-error: true
        run: |
          set +e
          flutter analyze --no-pub 2>&1 | tee /tmp/analyze.txt
          ANALYZE_EXIT=${PIPESTATUS[0]}
          set -e
          # Use grep+wc -l piped (wc -l always exits 0, no multiline variable bug)
          ERR=$(grep -E "error •"   /tmp/analyze.txt 2>/dev/null | wc -l | xargs)
          WRN=$(grep -E "warning •" /tmp/analyze.txt 2>/dev/null | wc -l | xargs)
          INF=$(grep -E "info •"    /tmp/analyze.txt 2>/dev/null | wc -l | xargs)
          echo "ANALYZE_ERR=${ERR}" >> "$GITHUB_ENV"
          echo "ANALYZE_WRN=${WRN}" >> "$GITHUB_ENV"
          echo "ANALYZE_INF=${INF}" >> "$GITHUB_ENV"
          echo "ANALYZE_OK=$([ $ANALYZE_EXIT -eq 0 ] && echo true || echo false)" >> "$GITHUB_ENV"
          if [ $ANALYZE_EXIT -ne 0 ]; then
            echo "⚠️  Analysis: $ERR error(s), $WRN warning(s), $INF info"
          else
            echo "✅ Analysis clean"
          fi

      # ── Test 3: No debug print() in production code ────────────
      - name: Check debug print statements
        if: always()
        run: |
          FOUND=$(grep -rn "^\s*print(" lib/ --include="*.dart" 2>/dev/null | \
                  grep -v "//.*print" | wc -l | xargs)
          echo "DEBUG_PRINTS=${FOUND}" >> "$GITHUB_ENV"
          if [ "${FOUND}" -gt 0 ]; then
            echo "⚠️  ${FOUND} debug print() call(s):"
            grep -rn "^\s*print(" lib/ --include="*.dart" | grep -v "//.*print" || true
          else
            echo "✅ No debug print() statements"
          fi

      # ── Test 4: No hardcoded http:// URLs ───────────────────────
      - name: Check insecure URLs
        if: always()
        run: |
          FOUND=$(grep -rn "\"http://" lib/ --include="*.dart" 2>/dev/null | \
                  grep -v "localhost\|127\.0\.0\.1\|//.*http://" | wc -l | xargs)
          echo "HTTP_URLS=${FOUND}" >> "$GITHUB_ENV"
          echo "${FOUND} insecure http:// URL(s)"

      # ── Test 5: No TODO/FIXME ────────────────────────────────────
      - name: Check TODO/FIXME markers
        if: always()
        run: |
          FOUND=$(grep -rn "TODO\|FIXME\|HACK\|XXX" lib/ --include="*.dart" 2>/dev/null | wc -l | xargs)
          echo "TODOS=${FOUND}" >> "$GITHUB_ENV"
          echo "${FOUND} TODO/FIXME marker(s)"

      # ── Test 6: Run unit tests ───────────────────────────────────
      - name: Run Flutter tests
        id: tests
        if: always()
        continue-on-error: true
        run: |
          if find test/ -name "*_test.dart" 2>/dev/null | grep -q .; then
            set +e
            flutter test --reporter=expanded 2>&1 | tee /tmp/test.txt
            TEST_EXIT=${PIPESTATUS[0]}
            set -e
            PASS=$(grep -E "^\+[0-9]" /tmp/test.txt | wc -l | xargs)
            FAIL=$(grep -E "^-[0-9]|Some tests failed" /tmp/test.txt | wc -l | xargs)
            echo "TEST_PASS=${PASS}" >> "$GITHUB_ENV"
            echo "TEST_FAIL=${FAIL}" >> "$GITHUB_ENV"
            echo "TEST_OK=$([ $TEST_EXIT -eq 0 ] && echo true || echo false)" >> "$GITHUB_ENV"
            if [ $TEST_EXIT -ne 0 ]; then
              echo "⚠️  Some tests failed (check output above)"
            else
              echo "✅ All tests passed"
            fi
          else
            echo "TEST_OK=skip" >> "$GITHUB_ENV"
            echo "TEST_PASS=0"  >> "$GITHUB_ENV"
            echo "TEST_FAIL=0"  >> "$GITHUB_ENV"
            echo "⏭️  No test files found"
          fi

      # ── Step summary ─────────────────────────────────────────────
      - name: Write summary
        if: always()
        run: |
          OK(){
            case "$1" in
              true)  echo "✅ Pass" ;;
              false) echo "❌ Fail" ;;
              skip)  echo "⏭️ Skipped" ;;
              *)     echo "❓ $1" ;;
            esac
          }
          {
            echo "# 🔍 Code Quality Report"
            echo ""
            echo "| Check | Status | Detail |"
            echo "|---|---|---|"
            echo "| Dart format      | $([ "${FORMAT_FAIL:-false}" = "true" ] && echo "⚠️ Issues" || echo "✅ Clean") | ${FORMAT_CHANGED:-0} file(s) changed |"
            echo "| Static analysis  | $(OK ${ANALYZE_OK:-skip}) | ${ANALYZE_ERR:-0} errors, ${ANALYZE_WRN:-0} warnings |"
            echo "| Debug prints     | $([ "${DEBUG_PRINTS:-0}" = "0" ] && echo "✅" || echo "⚠️") | ${DEBUG_PRINTS:-0} found |"
            echo "| Insecure URLs    | $([ "${HTTP_URLS:-0}" = "0" ] && echo "✅" || echo "⚠️") | ${HTTP_URLS:-0} http:// |"
            echo "| TODOs/FIXMEs     | ℹ️ | ${TODOS:-0} markers |"
            echo "| Unit tests       | $(OK ${TEST_OK:-skip}) | Pass: ${TEST_PASS:-0}  Fail: ${TEST_FAIL:-0} |"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── PR comment ───────────────────────────────────────────────
      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fmt   = process.env.FORMAT_FAIL === 'true' ? '⚠️ Issues' : '✅ Clean';
            const anal  = process.env.ANALYZE_OK === 'true' ? '✅' : '❌';
            const tests = process.env.TEST_OK === 'skip' ? '⏭️' : process.env.TEST_OK === 'true' ? '✅' : '❌';
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🔍 Code Quality\n| Check | Status |\n|---|---|\n| Dart format | ${fmt} (${process.env.FORMAT_CHANGED||0} files) |\n| Analysis | ${anal} ${process.env.ANALYZE_ERR||0} errors |\n| Tests | ${tests} pass:${process.env.TEST_PASS||0} fail:${process.env.TEST_FAIL||0} |`,
            });

      # ── Trigger security audit ──────────────────────────────────
      - name: Trigger security-audit
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'security-audit.yml', ref: 'main', inputs: {},
            });
