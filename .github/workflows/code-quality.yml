name: "Code Quality"

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Version Bump"]
    types: [completed]
  push:
    branches: [main]
    paths: ['lib/**', 'test/**', 'pubspec.yaml']
  pull_request:
    branches: [main]

permissions:
  contents:      read
  actions:       write
  pull-requests: write

jobs:
  quality:
    name: "Analyze, Format & Test"
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install deps
        run: flutter pub get

      # в”Ђв”Ђ Test 1: Dart formatter в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Check dart formatting
        id: format
        run: |
          OUT=$(dart format --output=none --set-exit-if-changed lib/ test/ 2>&1 || true)
          if echo "$OUT" | grep -q "Formatted"; then
            echo "FORMAT_FAIL=true"  >> "$GITHUB_ENV"
            echo "FORMAT_DETAIL<<EOF" >> "$GITHUB_ENV"
            echo "$OUT" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
            echo "вќЊ Format issues:"
            echo "$OUT"
          else
            echo "FORMAT_FAIL=false" >> "$GITHUB_ENV"
            echo "вњ… All files formatted correctly"
          fi

      # в”Ђв”Ђ Test 2: Static analysis в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Flutter analyze
        id: analyze
        run: |
          flutter analyze --no-pub 2>&1 | tee /tmp/analyze.txt
          EXIT=${PIPESTATUS[0]}
          ERR=$(grep -c "error вЂў"   /tmp/analyze.txt 2>/dev/null || echo 0)
          WRN=$(grep -c "warning вЂў" /tmp/analyze.txt 2>/dev/null || echo 0)
          INF=$(grep -c "info вЂў"    /tmp/analyze.txt 2>/dev/null || echo 0)
          echo "ANALYZE_ERR=$ERR" >> "$GITHUB_ENV"
          echo "ANALYZE_WRN=$WRN" >> "$GITHUB_ENV"
          echo "ANALYZE_INF=$INF" >> "$GITHUB_ENV"
          echo "ANALYZE_OK=$([ $EXIT -eq 0 ] && echo true || echo false)" >> "$GITHUB_ENV"
          exit $EXIT

      # в”Ђв”Ђ Test 3: No debug print() in production code в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Check debug print statements
        if: always()
        run: |
          FOUND=$(grep -rn "^\s*print(" lib/ --include="*.dart" 2>/dev/null | \
                  grep -v "//.*print" | wc -l || echo 0)
          echo "DEBUG_PRINTS=$FOUND" >> "$GITHUB_ENV"
          [ "$FOUND" -gt 0 ] && \
            grep -rn "^\s*print(" lib/ --include="*.dart" | grep -v "//.*print" || true
          echo "${FOUND} debug print(s) found"

      # в”Ђв”Ђ Test 4: No hardcoded http:// URLs в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Check insecure URLs
        if: always()
        run: |
          FOUND=$(grep -rn "\"http://" lib/ --include="*.dart" 2>/dev/null | \
                  grep -v "localhost\|127\.0\.0\.1\|//.*http://" | wc -l || echo 0)
          echo "HTTP_URLS=$FOUND" >> "$GITHUB_ENV"
          echo "$FOUND insecure http:// URL(s)"

      # в”Ђв”Ђ Test 5: No TODO/FIXME left in release code в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Check TODO/FIXME markers
        if: always()
        run: |
          FOUND=$(grep -rn "TODO\|FIXME\|HACK\|XXX" lib/ --include="*.dart" 2>/dev/null | wc -l || echo 0)
          echo "TODOS=$FOUND" >> "$GITHUB_ENV"
          echo "$FOUND TODO/FIXME marker(s)"

      # в”Ђв”Ђ Test 6: Run unit tests if they exist в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Run unit tests
        if: always()
        run: |
          if find test/ -name "*_test.dart" 2>/dev/null | grep -q .; then
            flutter test --reporter=expanded 2>&1 | tee /tmp/test.txt
            EXIT=${PIPESTATUS[0]}
            PASS=$(grep -c "вњ“\|вњ…\| PASS" /tmp/test.txt || echo 0)
            FAIL=$(grep -c "вњ—\|вќЊ\| FAIL" /tmp/test.txt || echo 0)
            echo "TEST_PASS=$PASS" >> "$GITHUB_ENV"
            echo "TEST_FAIL=$FAIL" >> "$GITHUB_ENV"
            echo "TEST_OK=$([ $EXIT -eq 0 ] && echo true || echo false)" >> "$GITHUB_ENV"
          else
            echo "TEST_OK=skip" >> "$GITHUB_ENV"
            echo "No tests found"
          fi

      # в”Ђв”Ђ Step summary в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Write summary
        if: always()
        run: |
          OK(){ [ "$1" = "true" ] && echo "вњ…" || ([ "$1" = "skip" ] && echo "вЏ­пёЏ" || echo "вќЊ"); }
          {
            echo "# рџ”Ќ Code Quality Report"
            echo "| Check | Status | Detail |"
            echo "|---|---|---|"
            echo "| Dart format     | $(OK $FORMAT_FAIL false) | $([ "$FORMAT_FAIL" = "true" ] && echo "Needs formatting" || echo "Clean") |"
            echo "| Static analysis | $(OK $ANALYZE_OK)        | $ANALYZE_ERR errors, $ANALYZE_WRN warnings, $ANALYZE_INF info |"
            echo "| Debug prints    | $([ "${DEBUG_PRINTS:-0}" = "0" ] && echo "вњ…" || echo "вљ пёЏ") | ${DEBUG_PRINTS:-0} found |"
            echo "| Insecure URLs   | $([ "${HTTP_URLS:-0}" = "0" ] && echo "вњ…" || echo "вљ пёЏ") | ${HTTP_URLS:-0} http:// |"
            echo "| TODOs/FIXMEs    | в„№пёЏ | ${TODOS:-0} markers |"
            echo "| Unit tests      | $(OK ${TEST_OK:-skip}) | Pass: ${TEST_PASS:-0} Fail: ${TEST_FAIL:-0} |"
          } >> "$GITHUB_STEP_SUMMARY"

      # в”Ђв”Ђ PR comment в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const rows = [
              ['Dart format',     process.env.FORMAT_FAIL === 'true' ? 'вќЊ' : 'вњ…', process.env.FORMAT_FAIL === 'true' ? 'Run `dart format lib/ test/`' : 'Clean'],
              ['Static analysis', process.env.ANALYZE_OK   === 'true' ? 'вњ…' : 'вќЊ', `${process.env.ANALYZE_ERR||0} errors`],
              ['Debug prints',    +process.env.DEBUG_PRINTS > 0 ? 'вљ пёЏ' : 'вњ…', `${process.env.DEBUG_PRINTS||0} found`],
              ['Insecure URLs',   +process.env.HTTP_URLS    > 0 ? 'вљ пёЏ' : 'вњ…', `${process.env.HTTP_URLS||0} found`],
              ['Unit tests',      process.env.TEST_OK === 'skip' ? 'вЏ­пёЏ' : process.env.TEST_OK === 'true' ? 'вњ…' : 'вќЊ', `${process.env.TEST_PASS||0} pass`],
            ];
            const table = rows.map(([c,s,d]) => `| ${c} | ${s} | ${d} |`).join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## рџ”Ќ Code Quality\n| Check | Status | Detail |\n|---|---|---|\n${table}`,
            });

      # в”Ђв”Ђ Trigger security audit в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Trigger security-audit
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'security-audit.yml', ref: 'main', inputs: {},
            });
