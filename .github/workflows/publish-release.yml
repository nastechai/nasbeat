name: "Publish Release"

on:
  workflow_dispatch:
    inputs:
      version:    { type: string,  default: '' }
      prerelease: { type: boolean, default: false }
  workflow_run:
    workflows: ["Build Linux"]
    types: [completed]

permissions:
  contents: write
  actions:  write

jobs:
  publish:
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Resolve version & tag
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
            echo "TAG=v${{ inputs.version }}"    >> "$GITHUB_ENV"
          else
            VER=$(grep -E '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
            echo "VERSION=$VER" >> "$GITHUB_ENV"
            echo "TAG=v$VER"    >> "$GITHUB_ENV"
          fi

      # ── Test 1: Tag must exist before publishing ─────────────────
      - name: Verify git tag exists
        run: |
          git fetch --tags
          if git rev-parse "${{ env.TAG }}" >/dev/null 2>&1; then
            echo "✅ Tag ${{ env.TAG }} exists"
          else
            echo "❌ Tag ${{ env.TAG }} not found — version-bump must run first"
            exit 1
          fi

      # ── Generate CHANGELOG body ──────────────────────────────────
      - name: Generate release body
        run: |
          git fetch --tags --force
          PREV=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" | sort -V | grep -v "^${{ env.TAG }}$" | tail -1)
          DATE=$(date -u +'%Y-%m-%d')

          [ -z "$PREV" ] && LOG=$(git log --format="%s|%h" HEAD 2>/dev/null | head -60) || \
                            LOG=$(git log --format="%s|%h" "${PREV}..${{ env.TAG }}" 2>/dev/null | head -60)

          FEATS="" FIXES="" PERF="" OTHERS=""
          while IFS='|' read -r MSG SHA; do
            [ -z "$MSG" ] && continue
            ITEM="- ${MSG} (\`${SHA}\`)"
            if   echo "$MSG" | grep -qiE '^feat(\(.*\))?!?:';   then FEATS="${FEATS}\n${ITEM}"
            elif echo "$MSG" | grep -qiE '^fix(\(.*\))?!?:';    then FIXES="${FIXES}\n${ITEM}"
            elif echo "$MSG" | grep -qiE '^perf(\(.*\))?!?:';   then PERF="${PERF}\n${ITEM}"
            elif echo "$MSG" | grep -qiE '^\[skip ci\]'; then :
            else OTHERS="${OTHERS}\n${ITEM}"; fi
          done <<< "$LOG"

          {
            echo "## Nasbeat ${{ env.TAG }}  —  ${DATE}"
            echo ""
            echo "### 📦 Downloads"
            echo "| Platform | File |"
            echo "|---|---|"
            echo "| Android (arm64) | \`Nasbeat-v${{ env.VERSION }}-Android-arm64-v8a.apk\` |"
            echo "| Android (armv7) | \`Nasbeat-v${{ env.VERSION }}-Android-armeabi-v7a.apk\` |"
            echo "| Android (x86_64)| \`Nasbeat-v${{ env.VERSION }}-Android-x86_64.apk\` |"
            echo "| Android (all)   | \`Nasbeat-v${{ env.VERSION }}-Android-universal.apk\` |"
            echo "| Windows x64     | \`Nasbeat-v${{ env.VERSION }}-Windows-x64.zip\` |"
            echo "| Linux x64       | \`Nasbeat-v${{ env.VERSION }}-Linux-x64.tar.gz\` |"
            echo ""
            [ -n "$FEATS"  ] && printf '### ✨ New Features\n%b\n\n' "$FEATS"
            [ -n "$FIXES"  ] && printf '### 🐛 Bug Fixes\n%b\n\n'    "$FIXES"
            [ -n "$PERF"   ] && printf '### ⚡ Performance\n%b\n\n'   "$PERF"
            [ -n "$OTHERS" ] && printf '### 📝 Other\n%b\n\n'        "$OTHERS"
            [ -n "$PREV"   ] && echo "---" && \
              echo "**Full diff:** https://github.com/${{ github.repository }}/compare/${PREV}...${{ env.TAG }}"
          } > /tmp/release_body.md

          cat /tmp/release_body.md

      # ── Test 2: Release body must be non-empty ────────────────────
      - name: Verify release body
        run: |
          SIZE=$(wc -c < /tmp/release_body.md)
          [ "$SIZE" -gt 100 ] && echo "✅ Release body: ${SIZE} chars" || \
            { echo "❌ Release body too short"; exit 1; }

      # ── Publish / update the GitHub Release ──────────────────────
      - name: Create or update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag:          ${{ env.TAG }}
          name:         "Nasbeat v${{ env.VERSION }}"
          bodyFile:     /tmp/release_body.md
          token:        ${{ secrets.GITHUB_TOKEN }}
          prerelease:   ${{ inputs.prerelease }}
          allowUpdates: true

      # ── Trigger all post-release workflows in parallel ───────────
      - name: Trigger post-release pipeline
        uses: actions/github-script@v7
        with:
          script: |
            const VERSION  = '${{ env.VERSION }}';
            const PREREL   = '${{ inputs.prerelease }}';
            const jobs = [
              { id: 'health-check.yml',       inputs: {} },
              { id: 'update-changelog.yml',    inputs: { version: VERSION } },
              { id: 'cleanup-artifacts.yml',   inputs: {} },
              { id: 'sync-branches.yml',       inputs: {} },
              { id: 'notify-release.yml',      inputs: { version: VERSION } },
            ];
            for (const j of jobs) {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner, repo: context.repo.repo,
                workflow_id: j.id, ref: 'main', inputs: j.inputs,
              });
              console.log(`Triggered: ${j.id}`);
            }

      - name: Summary
        run: |
          {
            echo "# 🎉 Released: Nasbeat ${{ env.TAG }}"
            echo ""
            echo "https://github.com/${{ github.repository }}/releases/tag/${{ env.TAG }}"
            echo ""
            echo "Post-release jobs triggered: health-check, update-changelog, cleanup-artifacts, sync-branches, notify-release"
          } >> "$GITHUB_STEP_SUMMARY"
