name: "Build Android"

on:
  workflow_dispatch:
    inputs:
      version:    { type: string,  default: '' }
      prerelease: { type: boolean, default: false }
  workflow_run:
    workflows: ["Version Bump"]
    types: [completed]

permissions:
  contents: write
  actions:  write

jobs:
  build-android:
    name: "Build Android APKs"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Java
        uses: actions/setup-java@v3.12.0
        with:
          distribution: oracle
          java-version: '17'

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter deps
        run: flutter pub get

      # ── Test: dart analyze must pass ───────────────────────────
      - name: Pre-build dart analyze
      - run: flutter analyze --no-pub || true

      - name: Resolve version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            VER=$(grep -E '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
            echo "VERSION=$VER" >> "$GITHUB_ENV"
          fi

      - name: Create keystore
        run: |
          if [ -z "${{ secrets.KEY_STORE }}" ]; then
            echo "No signing secrets — using debug signing."
            exit 0
          fi
          echo "${{ secrets.KEY_STORE }}" | base64 --decode > ./android/nasbeat.jks

      - name: Create keystore properties
        run: |
          if [ -z "${{ secrets.KEY_STORE }}" ]; then exit 0; fi
          cat > ./android/key.properties << EOF
          keyPassword=${{ secrets.KEY_PASSWORD }}
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          EOF

      - name: Build APKs (split ABI)
        run: flutter build apk --release --split-per-abi --build-number ${{ github.run_number }}

      # ── Test: verify all 4 APKs were produced ─────────────────
      - name: Verify APK outputs exist
        run: |
          BASE="build/app/outputs/flutter-apk"
          for apk in app-release.apk app-arm64-v8a-release.apk app-armeabi-v7a-release.apk app-x86_64-release.apk; do
            [ -f "$BASE/$apk" ] && echo "✅ $apk" || { echo "❌ Missing $apk"; exit 1; }
          done

      - name: Rename APKs
        run: |
          VER="${{ env.VERSION }}"
          BASE="build/app/outputs/flutter-apk"
          mv "$BASE/app-release.apk"              "$BASE/Nasbeat-v${VER}-Android-universal.apk"
          mv "$BASE/app-arm64-v8a-release.apk"    "$BASE/Nasbeat-v${VER}-Android-arm64-v8a.apk"
          mv "$BASE/app-armeabi-v7a-release.apk"  "$BASE/Nasbeat-v${VER}-Android-armeabi-v7a.apk"
          mv "$BASE/app-x86_64-release.apk"       "$BASE/Nasbeat-v${VER}-Android-x86_64.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nasbeat-v${{ env.VERSION }}-Android
          retention-days: 7
          path: |
            build/app/outputs/flutter-apk/Nasbeat-v${{ env.VERSION }}-Android-universal.apk
            build/app/outputs/flutter-apk/Nasbeat-v${{ env.VERSION }}-Android-arm64-v8a.apk
            build/app/outputs/flutter-apk/Nasbeat-v${{ env.VERSION }}-Android-armeabi-v7a.apk
            build/app/outputs/flutter-apk/Nasbeat-v${{ env.VERSION }}-Android-x86_64.apk

      - name: Attach APKs to release
        uses: ncipollo/release-action@v1
        with:
          artifacts: |
            build/app/outputs/flutter-apk/Nasbeat-v${{ env.VERSION }}-Android-universal.apk
            build/app/outputs/flutter-apk/Nasbeat-v${{ env.VERSION }}-Android-arm64-v8a.apk
            build/app/outputs/flutter-apk/Nasbeat-v${{ env.VERSION }}-Android-armeabi-v7a.apk
            build/app/outputs/flutter-apk/Nasbeat-v${{ env.VERSION }}-Android-x86_64.apk
          tag:              v${{ env.VERSION }}
          name:             "Nasbeat v${{ env.VERSION }}"
          token:            ${{ secrets.GITHUB_TOKEN }}
          prerelease:       ${{ inputs.prerelease }}
          allowUpdates:     true
          omitBodyDuringUpdate: true

      # ── Trigger APK sign-verify ─────────────────────────────────
      - name: Trigger sign-verify workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'sign-verify.yml', ref: 'main',
              inputs: { version: '${{ env.VERSION }}' },
            });
