name: "Build Android"

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3.12.0
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Extract version from pubspec.yaml
        run: |
          VERSION=$(grep -E '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create keystore file
        run: |
          if [ -z "${{ secrets.KEY_STORE }}" ]; then
            echo "No signing secrets found; release APKs will use debug signing."
            exit 0
          fi
          echo "${{ secrets.KEY_STORE }}" | base64 --decode > ./android/nasbeat.jks

      - name: Create Keystore properties
        run: |
          if [ -z "${{ secrets.KEY_STORE }}" ]; then exit 0; fi
          cat > ./android/key.properties << EOF
          keyPassword=${{ secrets.KEY_PASSWORD }}
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          EOF

      - name: Build APKs
        run: flutter build apk --release --split-per-abi --build-number ${{ github.run_number }}

      - name: Verify Signing
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          echo "Using build tools: $BUILD_TOOLS"
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner verify build/app/outputs/flutter-apk/app-release.apk
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner verify build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner verify build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner verify build/app/outputs/flutter-apk/app-x86_64-release.apk

      - name: Rename APK files
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/nasbeat_android_v${{ env.VERSION }}+${{ github.run_number }}_universal.apk
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
             build/app/outputs/flutter-apk/nasbeat_android_v${{ env.VERSION }}+${{ github.run_number }}_armeabi-v7a.apk
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             build/app/outputs/flutter-apk/nasbeat_android_v${{ env.VERSION }}+${{ github.run_number }}_arm64-v8a.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk \
             build/app/outputs/flutter-apk/nasbeat_android_v${{ env.VERSION }}+${{ github.run_number }}_x86_64.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Release-Android
          path: |
            build/app/outputs/flutter-apk/nasbeat_android_v${{ env.VERSION }}+${{ github.run_number }}_universal.apk
            build/app/outputs/flutter-apk/nasbeat_android_v${{ env.VERSION }}+${{ github.run_number }}_armeabi-v7a.apk
            build/app/outputs/flutter-apk/nasbeat_android_v${{ env.VERSION }}+${{ github.run_number }}_arm64-v8a.apk
            build/app/outputs/flutter-apk/nasbeat_android_v${{ env.VERSION }}+${{ github.run_number }}_x86_64.apk

      - name: Publish to Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: |
            build/app/outputs/flutter-apk/nasbeat_android_v${{ env.VERSION }}+${{ github.run_number }}_universal.apk
            build/app/outputs/flutter-apk/nasbeat_android_v${{ env.VERSION }}+${{ github.run_number }}_armeabi-v7a.apk
            build/app/outputs/flutter-apk/nasbeat_android_v${{ env.VERSION }}+${{ github.run_number }}_arm64-v8a.apk
            build/app/outputs/flutter-apk/nasbeat_android_v${{ env.VERSION }}+${{ github.run_number }}_x86_64.apk
          tag: v${{ env.VERSION }}+${{ github.run_number }}
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: true
          allowUpdates: true
          omitBodyDuringUpdate: true
