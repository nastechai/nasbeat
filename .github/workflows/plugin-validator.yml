name: "Plugin Validator"

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Plugin Repo Sync"]
    types: [completed]

permissions:
  contents: read
  issues:   write
  actions:  write

jobs:
  validate:
    name: "Validate Plugin Manifests"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      # ── Test 1: Fetch live repositories.json ────────────────────
      - name: Fetch live repositories.json
        run: |
          CODE=$(curl -s --max-time 15 \
            -o /tmp/repositories.json \
            -w "%{http_code}" \
            "https://nastechai.github.io/nasbeat/repositories.json" || echo 000)
          echo "HTTP: $CODE"
          if [ "$CODE" = "200" ]; then
            python3 -m json.tool /tmp/repositories.json
            COUNT=$(python3 -c "import json; d=json.load(open('/tmp/repositories.json')); print(len(d.get('repositories',[])))")
            echo "REPO_COUNT=${COUNT}" >> "$GITHUB_ENV"
            echo "Fetched: $COUNT repo(s)"
          else
            echo "REPO_COUNT=0" >> "$GITHUB_ENV"
            echo "Could not fetch repositories.json (HTTP $CODE)"
            exit 1
          fi

      # ── Test 2: Validate each plugin repository manifest ────────
      - name: Validate each plugin repository manifest
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, sys

          data   = json.load(open('/tmp/repositories.json'))
          repos  = data.get('repositories', [])
          errors = []
          total  = 0

          for repo in repos:
              url = repo.get('url', '')
              if not url:
                  errors.append("Entry has no url: " + str(repo))
                  continue
              print("Checking: " + url)
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'nasbeat-ci/1.0'})
                  with urllib.request.urlopen(req, timeout=20) as r:
                      mani    = json.loads(r.read())
                      total  += 1
                      name    = mani.get('name', mani.get('title', '?'))
                      plugins = mani.get('plugins', [])
                      print("  OK name: " + name)
                      print("  OK plugins: " + str(len(plugins)))
                      for p in plugins:
                          pid = p.get('id', '')
                          ver = p.get('version', '')
                          dl  = p.get('download_url', p.get('downloadUrl', ''))
                          if not pid:
                              errors.append("Plugin missing id in " + url)
                          if not ver:
                              errors.append("Plugin '" + pid + "' missing version in " + url)
                          if dl and not dl.startswith('https://'):
                              errors.append("Plugin '" + pid + "' download URL not HTTPS: " + dl)
              except urllib.error.HTTPError as e:
                  errors.append("HTTP " + str(e.code) + " fetching " + url)
              except Exception as e:
                  errors.append("Error fetching " + url + ": " + str(e))

          print("\nChecked " + str(total) + "/" + str(len(repos)) + " manifests")
          if errors:
              print("FAIL: " + str(len(errors)) + " error(s):")
              for e in errors:
                  print("  - " + e)
              sys.exit(1)
          else:
              print("All plugin manifests valid")
          PYEOF

      # ── Test 3: Spot-check plugin download URLs ─────────────────
      - name: Spot-check plugin download URLs
        continue-on-error: true
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error

          data    = json.load(open('/tmp/repositories.json'))
          checked = 0

          for repo in data.get('repositories', []):
              url = repo.get('url', '')
              if not url:
                  continue
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'nasbeat-ci/1.0'})
                  with urllib.request.urlopen(req, timeout=20) as r:
                      mani = json.loads(r.read())
                  for p in mani.get('plugins', [])[:2]:
                      dl = p.get('download_url', p.get('downloadUrl', ''))
                      if not dl:
                          continue
                      try:
                          req2 = urllib.request.Request(
                              dl, method='HEAD',
                              headers={'User-Agent': 'nasbeat-ci/1.0'}
                          )
                          with urllib.request.urlopen(req2, timeout=15) as r2:
                              sz = r2.headers.get('Content-Length', '?')
                              print("  OK " + p.get('id','?') + " -> " + str(sz) + " bytes")
                              checked += 1
                      except urllib.error.HTTPError as e:
                          print("  WARN " + p.get('id','?') + " HEAD -> HTTP " + str(e.code))
                      except Exception as e:
                          print("  WARN " + p.get('id','?') + " HEAD -> " + str(e))
              except Exception as e:
                  print("  WARN manifest " + url + ": " + str(e))

          print("Spot-checked " + str(checked) + " download URL(s)")
          PYEOF

      # ── Summary ─────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          {
            echo "# Plugin Validator"
            echo ""
            echo "| Item | Value |"
            echo "|---|---|"
            echo "| Repositories | ${REPO_COUNT:-0} |"
            echo "| Live URL | https://nastechai.github.io/nasbeat/repositories.json |"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Trigger final report ────────────────────────────────────
      - name: Trigger final-report
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'final-report.yml', ref: 'main', inputs: {},
            });
