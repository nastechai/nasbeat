name: "Plugin Repo Sync"

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Health Check"]
    types: [completed]
  push:
    branches: [main]
    paths: ['ghpage/static/repositories.json']

permissions:
  contents: write
  actions:  write

jobs:
  sync:
    name: "Sync repositories.json to gh-pages"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      # ── Test 1: JSON syntax validation ──────────────────────────
      - name: Validate repositories.json syntax
        id: validate_syntax
        run: |
          FILE="ghpage/static/repositories.json"
          if [ ! -f "$FILE" ]; then
            echo "❌ repositories.json not found at $FILE"
            exit 1
          fi
          if python3 -m json.tool "$FILE" > /dev/null 2>&1; then
            echo "✅ JSON syntax valid"
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "❌ Invalid JSON:"
            python3 -m json.tool "$FILE" || true
            exit 1
          fi

      # ── Test 2: Schema validation ────────────────────────────────
      - name: Validate repositories.json schema
        run: |
          python3 << 'PYEOF'
          import json, sys
          data = json.load(open('ghpage/static/repositories.json'))
          assert isinstance(data, dict),            "Root must be an object"
          assert 'repositories' in data,            "Missing 'repositories' key"
          assert isinstance(data['repositories'], list), "'repositories' must be an array"
          for i, repo in enumerate(data['repositories']):
              assert isinstance(repo, dict),        f"Item {i} must be an object"
          print(f"✅ Schema valid — {len(data['repositories'])} repo(s)")
          PYEOF

      # ── Test 3: Validate each repo URL is reachable ─────────────
      - name: Test each repository URL
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, sys
          data = json.load(open('ghpage/static/repositories.json'))
          repos = data.get('repositories', [])
          if not repos:
              print("⏭️  No repositories to test")
              sys.exit(0)
          fail = False
          for repo in repos:
              url = repo.get('url', '')
              if not url:
                  print(f"⚠️  Entry missing url field: {repo}")
                  continue
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'nasbeat-ci/1.0'})
                  with urllib.request.urlopen(req, timeout=15) as r:
                      body = r.read()
                      json.loads(body)
                      print(f"✅ {url} → reachable + valid JSON ({len(body)} bytes)")
              except urllib.error.HTTPError as e:
                  print(f"⚠️  {url} → HTTP {e.code}")
              except Exception as e:
                  print(f"❌ {url} → {e}")
                  fail = True
          sys.exit(1 if fail else 0)
          PYEOF

      # ── Sync to gh-pages branch ──────────────────────────────────
      - name: Push repositories.json to gh-pages root
        run: |
          git config user.name  "nasbeat-bot"
          git config user.email "bot@nastechai.dev"

          CONTENT=$(base64 -w 0 ghpage/static/repositories.json)

          # Get current SHA on gh-pages
          SHA=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/contents/repositories.json?ref=gh-pages" | \
            python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null || echo "")

          # Build payload
          PAYLOAD=$(python3 -c "
          import json, sys
          d = {
            'message': 'chore: sync repositories.json [skip ci]',
            'content': sys.argv[1],
            'branch':  'gh-pages',
          }
          if sys.argv[2]: d['sha'] = sys.argv[2]
          print(json.dumps(d))
          " "$CONTENT" "$SHA")

          RESULT=$(curl -s -X PUT \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/contents/repositories.json" \
            -d "$PAYLOAD")

          STATUS=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print('OK' if d.get('content') else d.get('message','FAIL'))" 2>/dev/null)
          echo "gh-pages sync: $STATUS"
          [ "$STATUS" = "OK" ] || { echo "❌ Sync failed: $STATUS"; exit 1; }

      # ── Test 4: Verify live URL is accessible ────────────────────
      - name: Verify live GitHub Pages URL
        run: |
          sleep 5  # brief pause for Pages CDN propagation
          CODE=$(curl -s --max-time 15 -o /dev/null -w "%{http_code}" \
            "https://nastechai.github.io/nasbeat/repositories.json" || echo 000)
          echo "Live URL HTTP: $CODE"
          [[ "$CODE" =~ ^(200|304)$ ]] && echo "✅ Live URL reachable" || \
            echo "⚠️  Live URL returned $CODE (CDN may be propagating)"

      - name: Summary
        if: always()
        run: |
          {
            echo "# 🔄 Plugin Repo Sync"
            echo "Synced \`ghpage/static/repositories.json\` → \`gh-pages\` branch"
            echo ""
            echo "Live URL: https://nastechai.github.io/nasbeat/repositories.json"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Trigger plugin validator ────────────────────────────────
      - name: Trigger plugin-validator
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'plugin-validator.yml', ref: 'main', inputs: {},
            });
